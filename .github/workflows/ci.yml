name: CI

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Check linting
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Run tests with coverage
        run: uv run pytest --cov=src --cov-report=xml --cov-report=term-missing
      - name: Check coverage on changed lines
        run: uv run diff-cover coverage.xml --compare-branch=origin/main --fail-under=90

  portal-lint:
    name: Auth Portal Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: auth-portal/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check

  portal-test:
    name: Auth Portal Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: auth-portal/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Run tests
        run: npm test

  backoffice-lint:
    name: "Backoffice: Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-backoffice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: auth-backoffice/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check

  backoffice-test:
    name: "Backoffice: Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-backoffice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: auth-backoffice/package-lock.json
      - run: npm ci
      - name: Run tests
        run: npm test

  copilot-fix:
    name: Request Copilot Fix
    needs: [lint, test, portal-lint, portal-test, backoffice-lint, backoffice-test]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = context.runId;

            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo, run_id: runId,
            });

            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            let report = '';

            for (const job of failedJobs) {
              const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner, repo, job_id: job.id,
              });
              const raw = typeof logs.data === 'string' ? logs.data : Buffer.from(logs.data).toString('utf8');
              const clean = raw.replace(/\x1b\[[0-9;]*m/g, '');
              const tail = clean.split('\n').slice(-60).join('\n').slice(-3000);

              let desc = job.name;
              let fix = '';
              if (job.name === 'Lint & Format') {
                desc = 'Lint & Format (ruff check + ruff format)';
                fix = [
                  '- Run `uv run ruff check . --fix` to auto-fix lint issues',
                  '- Run `uv run ruff format .` to fix formatting',
                  '- Common issues: unused imports, missing type annotations, line length',
                ].join('\n');
              } else if (job.name === 'Tests & Coverage') {
                desc = 'Tests & Coverage (pytest + diff-cover \u2265 90%)';
                fix = [
                  '- Run `uv run pytest` locally to reproduce the failure',
                  '- If diff-cover failed, add tests for uncovered changed lines',
                  '- Check that mocks and fixtures match current code',
                ].join('\n');
              } else if (job.name.includes('Auth Portal Lint')) {
                desc = 'Auth Portal Lint & Type Check (ESLint + tsc)';
                fix = [
                  '- Run `cd auth-portal && npm run lint -- --fix` to auto-fix ESLint issues',
                  '- Run `cd auth-portal && npm run type-check` locally to see type errors',
                  '- Check for missing imports, wrong types, or unused variables',
                ].join('\n');
              } else if (job.name.includes('Auth Portal Tests')) {
                desc = 'Auth Portal Tests (vitest)';
                fix = [
                  '- Run `cd auth-portal && npm test` locally to reproduce the failure',
                  '- Check that mocks and test fixtures match current code',
                ].join('\n');
              } else if (job.name.includes('Backoffice') && job.name.includes('Lint')) {
                desc = 'Backoffice: Lint & Type Check (ESLint + tsc)';
                fix = [
                  '- Run `cd auth-backoffice && npm run lint -- --fix` to auto-fix ESLint issues',
                  '- Run `cd auth-backoffice && npm run type-check` locally to see type errors',
                  '- Check for missing imports, wrong types, or unused variables',
                ].join('\n');
              } else if (job.name.includes('Backoffice') && job.name.includes('Tests')) {
                desc = 'Backoffice: Tests (vitest)';
                fix = [
                  '- Run `cd auth-backoffice && npm test` locally to reproduce the failure',
                  '- Check that mocks and test fixtures match current code',
                ].join('\n');
              }

              report += `### \u274c ${desc}\n\n`;
              if (fix) report += `**Suggested fixes:**\n${fix}\n\n`;
              report += `<details><summary>Last 60 lines of log output</summary>\n\n\`\`\`\n${tail}\n\`\`\`\n\n</details>\n\n`;
            }

            const body = [
              '## \ud83d\udea8 CI Failure Report\n',
              `**Workflow run:** [#${runId}](${context.serverUrl}/${owner}/${repo}/actions/runs/${runId})\n`,
              report,
              '---\n',
              'To request an automated fix, copy and paste the following comment exactly:\n',
              '`````',
              '@copilot Please fix the CI failures listed above. The full error logs are included in the collapsed sections. Follow the suggested fixes for each failed job.',
              '`````',
            ].join('\n');

            const pr = context.payload.pull_request;
            if (pr) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr.number, body,
              });
            }
