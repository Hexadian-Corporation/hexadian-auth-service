name: CI

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  packages: read
  pull-requests: write

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Check linting
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Run tests with coverage
        run: uv run pytest --cov=src --cov-report=xml --cov-report=term-missing
      - name: Check coverage on changed lines
        run: uv run diff-cover coverage.xml --compare-branch=origin/main --fail-under=90

  portal-lint:
    name: Auth Portal Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          cache: npm
          cache-dependency-path: auth-portal/package-lock.json
      - run: npm ci --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check

  portal-test:
    name: Auth Portal Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-portal
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          cache: npm
          cache-dependency-path: auth-portal/package-lock.json
      - run: npm ci --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install coverage reporter
        run: npm install --save-dev @vitest/coverage-v8@^4.1.0
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Check coverage on changed lines
        run: pipx run diff-cover coverage/cobertura-coverage.xml --compare-branch=origin/main --fail-under=90

  backoffice-lint:
    name: "Backoffice: Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-backoffice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: auth-backoffice/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check

  backoffice-test:
    name: "Backoffice: Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-backoffice
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: auth-backoffice/package-lock.json
      - run: npm ci
      - name: Install coverage reporter
        run: npm install --save-dev @vitest/coverage-v8@^4.1.0
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Check coverage on changed lines
        run: pipx run diff-cover coverage/cobertura-coverage.xml --compare-branch=origin/main --fail-under=90

  copilot-fix:
    name: Request Copilot Fix
    needs: [lint, test, portal-lint, portal-test, backoffice-lint, backoffice-test]
    if: failure()
    uses: Hexadian-Corporation/.github/.github/workflows/copilot-fix-reusable.yml@main
    with:
      stack: mixed
