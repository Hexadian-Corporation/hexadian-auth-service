# Standalone deployment — run auth service with its own MongoDB
# Usage: docker compose up
#
# Exposes the 'hexadian-net' network so other compose projects (e.g. hexadian-hauling-helper)
# can reach auth-service without being in the same compose file.
name: hexadian-auth-service

services:
  auth-service:
    build: .
    ports:
      - "8006:8006"
    environment:
      - HEXADIAN_AUTH_MONGO_URI=mongodb://auth-mongo:27017
      - HEXADIAN_AUTH_MONGO_DB=hexadian_auth
      - HEXADIAN_AUTH_JWT_SECRET=${HEXADIAN_AUTH_JWT_SECRET:-change-me-in-production}
    depends_on:
      auth-mongo:
        condition: service_healthy
    networks:
      - auth-inner-net
      - hexadian-net

  auth-mongo:
    image: mongo:7
    volumes:
      - auth-data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand('ping')" --quiet
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - auth-inner-net

volumes:
  auth-data:

networks:
  auth-inner-net:
    name: hexadian-auth-inner-net
    internal: true
  hexadian-net:
    name: hexadian-shared-net
